services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
    command: sh -c "node index.js"
    ports:
      - "3001:3000"
    depends_on:
      - db
    env_file:
      - ./.env

  db:
    image: mysql
    restart: always
    env_file:
      - ./.env
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sd2-db.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "8082:80"
    depends_on:
      - db

volumes:
  mysql_data: