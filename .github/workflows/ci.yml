name: ClosetSwap CI Pipeline

on:
  push:
    branches: [ main, master, sprint-4, Sprint-4-Abdala ]
  pull_request:
    branches: [ main, master, sprint-4, Sprint-4-Abdala ]

jobs:
  test:
    name: Install And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Software Engineering coursework/pg-sd2-revised/pg-sd2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Software Engineering coursework/pg-sd2-revised/pg-sd2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm test

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t closetswap:${{ github.sha }} "Software Engineering coursework/pg-sd2-revised/pg-sd2"
